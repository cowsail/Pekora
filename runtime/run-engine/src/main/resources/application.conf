pekko {
  loglevel = "INFO"

  actor {
    provider = "cluster"

    serialization-bindings {
      "org.pekora.dsl.RunEvent" = jackson-json
      "org.pekora.engine.RunState" = jackson-json
      "org.pekora.engine.RunCommand" = jackson-json
      "org.pekora.engine.RunCommandResponse" = jackson-json
      "org.pekora.engine.RunStatusResponse" = jackson-json
    }

    serializers {
      jackson-json = "org.apache.pekko.serialization.jackson.JacksonJsonSerializer"
    }
  }

  persistence {
    journal {
      plugin = "pekko.persistence.journal.inmem"
    }
    snapshot-store {
      plugin = "pekko.persistence.snapshot-store.local"
    }
  }

  cluster {
    seed-nodes = ["pekko://AgentFramework@127.0.0.1:25520"]
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
  }

  remote.artery {
    canonical.hostname = "127.0.0.1"
    canonical.port = 25520
  }

  management {
    http {
      hostname = "127.0.0.1"
      port = 8558
    }
  }
}
