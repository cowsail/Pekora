pekora {
  adapters {
    # Native adapter is always a single registry — enable/disable only
    native.enabled = true

    # Named adapter instances. Each key becomes the backend identifier used in workflow YAML.
    # Add as many instances of the same type as needed (e.g., two langgraph entries with
    # different endpoints and credentials).
    #
    # Supported types: langgraph, a2a, bedrock-agentcore, generic
    instances {
      langgraph-default {
        type = langgraph
        enabled = true
        service-url = "http://localhost:8123"
        service-url = ${?LANGGRAPH_SERVICE_URL}
        api-key = ""
        api-key = ${?LANGGRAPH_API_KEY}
      }
      a2a-default {
        type = a2a
        enabled = true
        service-url = "http://localhost:8200"
        service-url = ${?A2A_SERVICE_URL}
        api-key = ""
        api-key = ${?A2A_API_KEY}
      }
      bedrock-default {
        type = bedrock-agentcore
        enabled = true
        agent-runtime-arn = ""
        agent-runtime-arn = ${?BEDROCK_AGENT_RUNTIME_ARN}
        region = "us-east-1"
        region = ${?AWS_REGION}
        auth-mode = "sigv4"
        auth-mode = ${?BEDROCK_AUTH_MODE}
        oauth-token = ""
        oauth-token = ${?BEDROCK_OAUTH_TOKEN}
      }
      generic-default {
        type = generic
        enabled = true
        service-url = "http://localhost:8400"
        service-url = ${?GENERIC_SERVICE_URL}
        api-key = ""
        api-key = ${?GENERIC_API_KEY}
      }
    }
  }
}

pekko {
  loglevel = "INFO"

  actor {
    provider = "cluster"

    serialization-bindings {
      "org.pekora.dsl.RunEvent" = jackson-json
      "org.pekora.engine.RunState" = jackson-json
      "org.pekora.engine.RunCommand" = jackson-json
      "org.pekora.engine.RunCommandResponse" = jackson-json
      "org.pekora.engine.RunStatusResponse" = jackson-json
    }

    serializers {
      jackson-json = "org.apache.pekko.serialization.jackson.JacksonJsonSerializer"
    }
  }

  persistence {
    journal {
      plugin = "pekko.persistence.journal.inmem"
    }
    snapshot-store {
      plugin = "pekko.persistence.snapshot-store.local"
    }
  }

  cluster {
    seed-nodes = ["pekko://AgentFramework@127.0.0.1:25520"]
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
  }

  remote.artery {
    canonical.hostname = "127.0.0.1"
    canonical.port = 25520
  }

  management {
    http {
      hostname = "127.0.0.1"
      port = 8558
    }
  }
}
